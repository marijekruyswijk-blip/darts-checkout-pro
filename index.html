<div class="grid grid-cols-3 gap-2 mb-6">

<button onclick="setDifficulty('beginner')"

class="bg-blue-500 text-white rounded-xl py-3 font-bold">

</button>


<button onclick="setDifficulty('intermediate')"

</button>


<button onclick="setDifficulty('expert')"
id="expertBtn"
class="bg-slate-800 text-white rounded-xl py-3 font-bold">

Expert

</button>

</div>
Finish
</p>


<h2 id="checkoutNumber">
170
</h2>


<p class="text-blue-400 text-sm font-bold">
🎯 Three Dart Finish
</p>


<div class="mt-8">


<input
id="routeInput"
class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-center font-bold outline-none focus:border-blue-500"
placeholder="Example: T20 T11 D14"
/>


</div>



<button
onclick="checkRoute()"
class="mt-4 w-full bg-blue-500 hover:bg-blue-400 text-slate-950 font-black rounded-xl py-4 transition">

CHECK

</button>


<div 
id="feedbackBox"
class="hidden mt-4 rounded-xl p-4 font-bold text-sm border">
</div>
<button

onclick="newCheckout()"

class="mt-3 w-full bg-slate-800 hover:bg-slate-700 rounded-xl py-3 font-bold transition">

🔄 Next Checkout

</button>

<div class="grid grid-cols-2 gap-3 mt-4">


<button id="hintButton" class="bg-slate-800 rounded-xl py-3 font-bold">

💡 Hint

</button>


<button id="showAnswerButton" class="bg-slate-800 rounded-xl py-3 font-bold">

👁 Show Answer

</button>


</div>


</div>


</div>


</main>

let currentDifficulty = "beginner";

let totalAttempts = 0;
let correctAttempts = 0;
let currentStreak = 0;

function saveStats(){

    localStorage.setItem(
        "dartsStats",
        JSON.stringify({
            totalAttempts,
            correctAttempts,
            currentStreak
        })
    );

}
function loadStats(){

    let saved = localStorage.getItem("dartsStats");

    if(saved){

        let stats = JSON.parse(saved);

        totalAttempts = stats.totalAttempts || 0;
        correctAttempts = stats.correctAttempts || 0;
        currentStreak = stats.currentStreak || 0;

    }

    updateStats();

}

function newCheckout(){

let list = checkoutLevels[currentDifficulty];

let randomNumber =
list[Math.floor(Math.random()*list.length)];


document.getElementById("checkoutNumber").innerHTML =
randomNumber;

}
function setDifficulty(level){

  currentDifficulty = level;

  document.querySelectorAll("button").forEach(btn=>{
    btn.classList.remove("bg-blue-500");
    btn.classList.add("bg-slate-800");
  });

  let active = document.getElementById(level+"Btn");

  active.classList.remove("bg-slate-800");
  active.classList.add("bg-blue-500");

  newCheckout();

}  
function normalizeRoute(route){

return route
.toUpperCase()
.replace(/DOUBLE/g,"D")
.replace(/TRIPLE/g,"T")
.replace(/SINGLE/g,"S")
.replace(/BULLSEYE/g,"BULL")
.replace(/,/g," ")
.replace(/\s+/g," ")
.trim();

}
function showFeedback(message, type){

let box = document.getElementById("feedbackBox");

box.classList.remove(
"hidden",
"border-blue-500",
"border-red-500",
"text-blue-400",
"text-red-400"
);


box.innerHTML = message;


if(type === "success"){

box.classList.add(
"border-blue-500",
"text-blue-400"
);

}

else{

box.classList.add(
"border-red-500",
"text-red-400"
);

}

}
function checkRoute(){

let input = document
.getElementById("routeInput")
.value
.toUpperCase();

input = normalizeRoute(input);


let target = Number(
document.getElementById("checkoutNumber").innerHTML
);


let possibleRoutes = checkoutRoutes[target];


if(!possibleRoutes){

alert("No checkout data available for " + target);

return;

}


if(
possibleRoutes.some(route => normalizeRoute(route) === input)
){
    totalAttempts++;
    correctAttempts++;
    currentStreak++;

    updateStats();

    showFeedback(
    "🎯 PERFECT CHECKOUT!<br><br>"
    +
    target +
    "<br><br>"
    +
    input,
    "success"
    );

}

else{

    totalAttempts++;
    currentStreak = 0;

    updateStats();

    showFeedback(
    "❌ Probeer opnieuw<br><br>"
    +
    "Jouw poging:<br>"
    +
    input
    +
    "<br><br>⭐ Aanbevolen:<br>"
    +
    possibleRoutes[0],
    "error"
    );

}
function updateStats(){

    let accuracy = totalAttempts === 0
    ? 0
    : Math.round((correctAttempts / totalAttempts) * 100);

    document.getElementById("correctStat").textContent = correctAttempts;
    document.getElementById("accuracyStat").textContent = accuracy + "%";
    document.getElementById("streakStat").textContent = currentStreak;

}

}
function showHint(){

    let target = Number(
        document.getElementById("checkoutNumber").innerHTML
    );

    let routes = checkoutRoutes[target];

    if(routes){
        showFeedback(
            "💡 Hint:<br><br>" + routes[0],
            "info"
        );
    }

}


function showAnswer(){

    let target = Number(
        document.getElementById("checkoutNumber").innerHTML
    );

    let routes = checkoutRoutes[target];

    if(routes){
        showFeedback(
            "⭐ Answer:<br><br>" + routes[0],
            "success"
        );
    }

}
