<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout Coach Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen flex flex-col">


<header class="bg-slate-900 border-b border-slate-800 p-5">

<div class="max-w-5xl mx-auto flex justify-between items-center">

<h1 class="text-xl font-black tracking-wide text-emerald-400">
🎯 Checkout Coach Pro
</h1>

<span class="text-xs text-slate-500">
v0.1
</span>

</div>

</header>


<main class="flex-grow flex items-center justify-center p-5">


<div class="w-full max-w-md">


<!-- Stats -->

<div class="grid grid-cols-4 gap-3 mb-5">


<div class="bg-slate-900 rounded-2xl p-3 text-center border border-slate-800">
<p class="text-xs text-slate-500">Accuracy</p>
<p class="text-xl font-black text-emerald-400">
0%
</p>
</div>


<div class="bg-slate-900 rounded-2xl p-3 text-center border border-slate-800">
<p class="text-xs text-slate-500">Correct</p>
<p class="text-xl font-black">
0
</p>
</div>


<div class="bg-slate-900 rounded-2xl p-3 text-center border border-slate-800">
<p class="text-xs text-slate-500">Streak</p>
<p class="text-xl font-black text-orange-400">
0
</p>
</div>


<div class="bg-slate-900 rounded-2xl p-3 text-center border border-slate-800">
<p class="text-xs text-slate-500">Best</p>
<p class="text-xl font-black">
0
</p>
</div>


</div>



<!-- Main Card -->

<div class="bg-slate-900 rounded-3xl border border-slate-800 p-8 shadow-2xl text-center">


<p class="uppercase tracking-widest text-xs text-slate-500 font-bold">
Finish
</p>


<h2 class="text-7xl font-black mt-3 mb-2">
121
</h2>


<p class="text-emerald-400 text-sm font-bold">
🎯 Three Dart Finish
</p>


<div class="mt-8">


<input

class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-center font-bold outline-none focus:border-emerald-500"

placeholder="Example: T20 T11 D14"

/>


</div>



<button

class="mt-4 w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black rounded-xl py-4 transition">

CHECK

</button>



<div class="grid grid-cols-2 gap-3 mt-4">


<button class="bg-slate-800 rounded-xl py-3 font-bold">

💡 Hint

</button>


<button class="bg-slate-800 rounded-xl py-3 font-bold">

👁 Show Answer

</button>


</div>


</div>


</div>


</main>


<footer class="text-center text-xs text-slate-600 p-5">

Checkout Coach Pro © 2026

</footer>


</body>
</html>
